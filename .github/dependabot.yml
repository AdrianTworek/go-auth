version: 2
updates:
  # Go module dependencies
  - package-ecosystem: 'gomod'
    directory: '/'
    schedule:
      interval: 'weekly'
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'build'
      prefix-development: 'build'
    groups:
      go-minor-patch:
        update-types: ['minor', 'patch']

  # GitHub Actions used in .github/workflows
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
    commit-message:
      prefix: 'ci'
    groups:
      actions:
        patterns: ['*']
